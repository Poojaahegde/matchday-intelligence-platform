services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: matchday
      POSTGRES_PASSWORD: matchday
      POSTGRES_DB: matchday
    ports: ["5432:5432"]
    volumes: ["dbdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: ./apps/api
    env_file: .env
    depends_on: [db, redis]
    ports: ["8000:8000"]

  web:
    build: ./apps/web
    env_file: .env
    depends_on: [api]
    ports: ["3000:3000"]

volumes:
  dbdata:
